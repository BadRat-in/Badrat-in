# Regenerates the terminal-style profile stat cards in stats/ from live GitHub
# data and commits any changes back to the repo.
#
# The card SVGs are rendered by .github/scripts/build_cards.py (pure stdlib --
# no dependency install needed).
#
# TOKEN: the default GITHUB_TOKEN only sees PUBLIC data, which understates the
# numbers (private PRs/issues/commits and private-repo languages are dropped).
# To render the full picture, add a personal access token as the STATS_TOKEN
# repo secret (read:user + repo scope); the job prefers it when present.
#
# SCHEDULE: runs daily and on demand. The job reads STATS_TOKEN so the numbers
# reflect the full (private-inclusive) picture rather than the public-only view
# the default GITHUB_TOKEN would produce.
name: Profile stat cards

on:
  workflow_dispatch:
  schedule:
    # Daily at 00:00 UTC (05:30 IST)
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  build:
    name: generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate cards
        env:
          # Prefer STATS_TOKEN (full, private-inclusive view) when configured;
          # fall back to the repo's default token (public-only) otherwise.
          GITHUB_TOKEN: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}
        run: python .github/scripts/build_cards.py

      - name: Commit refreshed cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain stats/)" ]; then
            git add stats/
            git commit -m "chore: refresh profile stat cards [skip ci]"
            git push
          else
            echo "No changes to stat cards."
          fi
